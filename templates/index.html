<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="loadingBar" class="loading-bar" aria-hidden="true"></div>
    <main class="layout">
      <aside class="sidebar">
        <h1>ZA-BORS</h1>
        <p>סורק מניות BLINK בזמן אמת ככל שספק הנתונים מאפשר.</p>
        <label>מספר מניות לסריקה<input id="tickerCount" type="number" value="100" min="1" max="100" /></label>
        <label>שווי שוק מינימלי
          <select id="marketCap">
            <option value="0">ללא מינימום</option>
            <option value="50000000" selected>$50M</option>
            <option value="100000000">$100M</option>
            <option value="300000000">$300M</option>
            <option value="1000000000">$1B</option>
          </select>
        </label>
        <label>מחיר מניה מינימלי ($)<input id="minInvestment" type="number" value="5" min="0" step="0.01" /></label>
        <label>מחיר מניה מקסימלי ($)<input id="maxInvestment" type="number" value="100" min="0" step="0.01" /></label>
        <button id="scanButton" class="primary">הפעל סריקה</button>
        <button id="refreshWatchlist">רענן רשימת מעקב</button>
        <button id="logoutButton" class="logout-button" type="button">יציאה ונעילה</button>
      </aside>

      <section class="content">
        <header>
          <h2>חיפוש מניה</h2>
          <span>חפש לפי שם חברה, סימול או תחום</span>
        </header>
        <section class="panel">
          <form id="stockSearchForm" class="search-form">
            <input id="stockSearchInput" placeholder="לדוגמה: Tesla, FUTU, software" />
            <button type="submit">חפש</button>
          </form>
          <div id="stockSearchResults"></div>
        </section>

        <header>
          <h2>אבחון מניות</h2>
          <span id="status">מוכן</span>
        </header>
        <section id="signals" class="panel"></section>

        <header>
          <h2>רשימת מעקב אישית</h2>
          <span>נשמרת בקובץ מקומי על השרת</span>
        </header>
        <section class="panel">
          <form id="watchForm" class="watch-form">
            <input id="watchTicker" placeholder="Ticker, למשל FUTU" />
            <input id="watchBuyPrice" type="number" min="0" step="0.01" placeholder="מחיר קנייה" />
            <label class="inline"><input id="watchOwned" type="checkbox" /> קניתי בפועל</label>
            <input id="watchNotes" placeholder="הערה" />
            <button type="submit">הוסף</button>
          </form>
          <div id="sellAlerts"></div>
          <div id="watchlist"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js?v=20260601-login-fix"></script>
  </body>
</html>
