<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZA-BORS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ZA-BORS</p>
          <h1>בחירת נכס לשכירות בבורסה</h1>
        </div>
        <div class="top-actions">
          <button id="resetData" class="ghost-button" type="button">איפוס</button>
          <label class="file-button">
            יבוא BLINK / CSV
            <input id="importFile" type="file" accept=".json,.csv,application/json,text/csv" />
          </label>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel preferences-panel" aria-label="העדפות">
          <h2>העדפות החלטה</h2>
          <label>
            תקציב חודשי מקסימלי
            <input id="budget" type="text" inputmode="numeric" value="9000" />
          </label>
          <label>
            שטח רצוי במ"ר
            <input id="targetSqm" type="text" inputmode="numeric" value="55" />
          </label>
          <label>
            זמן הליכה מקסימלי לרכבת
            <input id="maxWalk" type="text" inputmode="numeric" value="8" />
          </label>
          <label>
            תאריך כניסה רצוי
            <input id="moveIn" type="date" value="2026-06-15" />
          </label>
          <label>
            משקל מחיר
            <input id="priceWeight" type="range" min="0" max="100" value="35" />
          </label>
          <label>
            משקל מיקום
            <input id="locationWeight" type="range" min="0" max="100" value="25" />
          </label>
          <label>
            משקל איכות והתאמה
            <input id="qualityWeight" type="range" min="0" max="100" value="30" />
          </label>
          <label>
            משקל גמישות
            <input id="flexWeight" type="range" min="0" max="100" value="10" />
          </label>
        </aside>

        <section class="results-area" aria-live="polite">
          <div class="summary-strip">
            <div>
              <span id="bestScore">0</span>
              <small>ציון מוביל</small>
            </div>
            <div>
              <span id="averageRent">0</span>
              <small>שכירות ממוצעת</small>
            </div>
            <div>
              <span id="listingCount">0</span>
              <small>נכסים במעקב</small>
            </div>
          </div>

          <div id="recommendation" class="recommendation"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ציון</th>
                  <th>נכס</th>
                  <th>שכירות</th>
                  <th>שטח</th>
                  <th>הליכה</th>
                  <th>זמינות</th>
                  <th>הערה</th>
                </tr>
              </thead>
              <tbody id="listingRows"></tbody>
            </table>
          </div>
        </section>

        <aside class="panel add-panel" aria-label="הוספת נכס">
          <h2>הוספת נכס</h2>
          <form id="listingForm">
            <label>שם הנכס<input name="title" required placeholder="לדוגמה: משרד בתובל" /></label>
            <label>כתובת<input name="address" required placeholder="רחוב / בניין" /></label>
            <label>שכירות חודשית<input name="monthlyRent" required type="text" inputmode="numeric" /></label>
            <label>שטח במ"ר<input name="sqm" required type="text" inputmode="numeric" /></label>
            <label>דקות לרכבת<input name="walkToTrain" required type="text" inputmode="numeric" /></label>
            <label>קומה<input name="floor" type="text" inputmode="numeric" value="1" /></label>
            <label>חניות<input name="parking" type="text" inputmode="numeric" value="0" /></label>
            <label>זמין מתאריך<input name="availableFrom" type="date" required /></label>
            <label>חוזה בחודשים<input name="contractMonths" type="text" inputmode="numeric" value="12" /></label>
            <label>מצב הנכס<input name="conditionScore" type="range" min="0" max="100" value="75" /></label>
            <label>התאמה אישית<input name="fitScore" type="range" min="0" max="100" value="75" /></label>
            <label>הערות<textarea name="notes" rows="3"></textarea></label>
            <button class="primary-button" type="submit">הוסף למעקב</button>
          </form>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
